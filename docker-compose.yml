services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ops
      POSTGRES_PASSWORD: ops
      POSTGRES_DB: ops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops -d ops"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ops:ops@postgres:5432/ops
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "alembic", "upgrade", "head"]

  seed:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ops:ops@postgres:5432/ops
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "scripts.seed_db"]

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ops:ops@postgres:5432/ops
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ops:ops@postgres:5432/ops
      REDIS_URL: redis://redis:6379
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "arq", "app.queue.worker.WorkerSettings"]
    deploy:
      replicas: 2   # two workers for concurrency; stateless thanks to Postgres checkpointer

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - app

volumes:
  pgdata:
