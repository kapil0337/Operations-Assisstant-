[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
filterwarnings =
    # langgraph-checkpoint-postgres 2.0.x ships a false-positive version check that
    # fires for langgraph 0.3.x even though the APIs we use are fully compatible.
    # Suppress until we upgrade to the langgraph >=0.5 + checkpoint-postgres >=3.x stack.
    ignore::DeprecationWarning:langgraph
    ignore::PendingDeprecationWarning
    ignore:.*allowed_objects.*:Warning
